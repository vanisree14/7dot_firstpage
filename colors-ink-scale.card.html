<!-- @dsCard group="Colors" viewport="700x130" name="Ink / Neutral Scale" subtitle="Cool greys tuned to the night sky" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:18px;background:var(--surface-card)}
.scale{display:flex;gap:6px}.c{flex:1;text-align:center}
.ch{height:62px;border-radius:var(--radius-sm);box-shadow:var(--shadow-xs)}
.t{font:var(--type-overline);color:var(--text-muted);margin-top:6px}</style></head>
<body><div class="scale"><div class="c"><div class="ch" style="background:var(--rv-ink-50)"></div><div class="t">50</div></div><div class="c"><div class="ch" style="background:var(--rv-ink-100)"></div><div class="t">100</div></div><div class="c"><div class="ch" style="background:var(--rv-ink-200)"></div><div class="t">200</div></div><div class="c"><div class="ch" style="background:var(--rv-ink-300)"></div><div class="t">300</div></div><div class="c"><div class="ch" style="background:var(--rv-ink-400)"></div><div class="t">400</div></div><div class="c"><div class="ch" style="background:var(--rv-ink-500)"></div><div class="t">500</div></div><div class="c"><div class="ch" style="background:var(--rv-ink-600)"></div><div class="t">600</div></div><div class="c"><div class="ch" style="background:var(--rv-ink-700)"></div><div class="t">700</div></div><div class="c"><div class="ch" style="background:var(--rv-ink-800)"></div><div class="t">800</div></div><div class="c"><div class="ch" style="background:var(--rv-ink-900)"></div><div class="t">900</div></div></div></body></html>
