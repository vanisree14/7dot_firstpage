<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px;background:var(--surface-card);display:flex;gap:18px;align-items:center}
.cell{width:150px;height:150px;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center}
.cell img{max-height:108px;max-width:108px}

.g{background:var(--rv-gradient-aurora)}.k{background:var(--surface-night)}

.note b{color:var(--text-strong)}</style></head>
<body>
<div class="cell w"><img src="../assets/logos/rv-symbol-gradient.png"></div>
<div class="cell g"><img src="../assets/logos/rv-symbol-white.png"></div>
<div class="cell k"><img src="../assets/logos/rv-symbol-white.png"></div>
<p class="note"><b>The hero glyph.</b> Use for app icons, avatars, favicons & "wow" accents — never as a generic UI icon.</p>
