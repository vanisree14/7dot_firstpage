<!-- @dsCard group="Slides" viewport="1280x720" name="Title" subtitle="Cover — Into the Wow" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
*{box-sizing:border-box}
html,body{margin:0}
.slide{width:1280px;height:720px;overflow:hidden;position:relative;font-family:var(--font-body)}
.eb{font:var(--type-eyebrow);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase}

.slide{background:radial-gradient(130% 120% at 80% -10%, #0e3346 0%, #0a1418 55%);display:flex;flex-direction:column;justify-content:center;padding:96px}
.glow{position:absolute;right:-120px;top:-120px;width:620px;height:620px;border-radius:50%;background:var(--rv-gradient-aurora);filter:blur(120px);opacity:.32}
.tag{font:var(--type-display-1);text-transform:uppercase;letter-spacing:var(--tracking-display);line-height:.9;background:var(--rv-gradient-aurora);-webkit-background-clip:text;background-clip:text;color:transparent;margin:18px 0 0}
.sub{font:var(--type-lead);color:var(--rv-ink-300);margin:22px 0 0;max-width:46ch}
.eb{color:#fff;opacity:.8}

</style></head><body>
<div class="slide">
  <div class="glow"></div>
  <img src="../assets/logos/rv-symbol-white.png" style="height:120px;width:120px;object-fit:contain;align-self:flex-start;position:relative">
  <div class="eb" style="margin-top:38px">Premium Self-Drive Road Trips · 2025</div>
  <h1 class="tag">Into the<br>Wow</h1>
  <p class="sub">Crafted routes. Cinematic surprises. Unforgettable moments — we transform road travel into a state of discovery.</p>
</div></body></html>
