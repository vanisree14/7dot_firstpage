<!-- @dsCard group="Slides" viewport="1280x720" name="Content — Values" subtitle="Headline + supporting grid" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
*{box-sizing:border-box}
html,body{margin:0}
.slide{width:1280px;height:720px;overflow:hidden;position:relative;font-family:var(--font-body)}
.eb{font:var(--type-eyebrow);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase}

.slide{background:var(--surface-card);padding:88px 96px;display:flex;flex-direction:column}
.eb{color:var(--text-brand)}
.h{font:var(--type-h1);text-transform:uppercase;color:var(--text-strong);margin:10px 0 44px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:30px 56px}
.item{border-top:3px solid;border-image:var(--rv-gradient-primary) 1;padding-top:18px}
.it-h{font:var(--type-h3);text-transform:uppercase;color:var(--text-strong);margin:0 0 8px}
.it-p{font:var(--type-body);color:var(--text-body);margin:0}

</style></head><body>
<div class="slide">
  <div class="eb">Core Values</div>
  <h2 class="h">What we believe</h2>
  <div class="grid">
    <div class="item"><h3 class="it-h">Wonder First</h3><p class="it-p">Every journey begins with the pursuit of awe.</p></div><div class="item"><h3 class="it-h">Curated Freedom</h3><p class="it-p">Freedom without friction — meticulously planned.</p></div><div class="item"><h3 class="it-h">Surprise & Delight</h3><p class="it-p">Thoughtful surprises woven into every mile.</p></div><div class="item"><h3 class="it-h">Soulful Connections</h3><p class="it-p">More than destinations — we seek stories.</p></div>
  </div>
</div></body></html>
