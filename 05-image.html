<!-- @dsCard group="Slides" viewport="1280x720" name="Full-Bleed Image" subtitle="Cinematic photo with protection gradient" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
*{box-sizing:border-box}
html,body{margin:0}
.slide{width:1280px;height:720px;overflow:hidden;position:relative;font-family:var(--font-body)}
.eb{font:var(--type-eyebrow);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase}

.slide{background:#0a1418;display:flex;align-items:flex-end}
.bg{position:absolute;inset:0;background-image:url(https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=1600&q=80&auto=format&fit=crop);background-size:cover;background-position:center}
.scrim{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,20,24,.92) 4%,rgba(8,20,24,0) 55%)}
.body{position:relative;padding:80px 96px;color:#fff}
.eb{color:var(--rv-teal-200)}
.h{font:var(--type-display-2);text-transform:uppercase;letter-spacing:var(--tracking-display);margin:10px 0 0;max-width:18ch}
.p{font:var(--type-lead);color:rgba(255,255,255,.9);max-width:50ch;margin:16px 0 0}

</style></head><body>
<div class="slide">
  <div class="bg"></div><div class="scrim"></div>
  <div class="body">
    <div class="eb">Himachal Pradesh</div>
    <h2 class="h">Spiti Valley Wonder Drive</h2>
    <p class="p">A high-altitude ribbon of cold desert, prayer flags, and the highest villages on earth.</p>
  </div>
</div></body></html>
