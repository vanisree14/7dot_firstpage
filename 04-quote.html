<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
*{box-sizing:border-box}
html,body{margin:0}
.slide{width:1280px;height:720px;overflow:hidden;position:relative;font-family:var(--font-body)}
.eb{font:var(--type-eyebrow);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase}

.slide{background:var(--surface-night);padding:110px 120px;display:flex;flex-direction:column;justify-content:center}
.mark{font:var(--type-display-1);line-height:.6;color:var(--rv-teal-500);height:64px}
.q{font:var(--type-h1);text-transform:none;color:#fff;font-family:var(--font-display);letter-spacing:.01em;line-height:1.04;max-width:20ch}
.by{font:var(--type-body);color:var(--rv-ink-400);margin-top:30px}

</style></head><body>
<div class="slide">
  <div class="mark">"</div>
  <p class="q">Somewhere between sunrise & starlight, magic waits on the road.</p>
  <div class="by">— Follow the compass. Feel the wow.</div>
</div></body></html>
