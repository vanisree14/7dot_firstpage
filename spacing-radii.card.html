<!-- @dsCard group="Spacing" viewport="700x170" name="Corner Radii" subtitle="Soft & friendly — nothing sharp" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;background:var(--surface-card)}
.row{display:flex;gap:16px;align-items:flex-end}
.b{width:84px;text-align:center}
.sq{height:74px;background:var(--rv-blue-100);border:2px solid var(--rv-blue-400)}
.t{font:var(--type-overline);color:var(--text-muted);margin-top:7px}</style></head>
<body><div class="row">
<div class="b"><div class="sq" style="border-radius:var(--radius-xs)"></div><div class="t">xs<br>6px</div></div><div class="b"><div class="sq" style="border-radius:var(--radius-sm)"></div><div class="t">sm<br>10px</div></div><div class="b"><div class="sq" style="border-radius:var(--radius-md)"></div><div class="t">md<br>14px</div></div><div class="b"><div class="sq" style="border-radius:var(--radius-lg)"></div><div class="t">lg<br>20px</div></div><div class="b"><div class="sq" style="border-radius:var(--radius-xl)"></div><div class="t">xl<br>28px</div></div><div class="b"><div class="sq" style="border-radius:var(--radius-2xl)"></div><div class="t">2xl<br>36px</div></div><div class="b"><div class="sq" style="border-radius:var(--radius-pill)"></div><div class="t">pill<br>999</div></div>
</div></body></html>
