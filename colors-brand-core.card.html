<!-- @dsCard group="Colors" viewport="700x180" name="Brand Core" subtitle="Voyage Blue, Explorer Teal, Aurora Green + monochromes" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:18px;background:var(--surface-card)}
.row{display:flex;gap:12px}
.sw{flex:1;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm)}
.chip{height:78px}
.meta{padding:8px 10px}
.nm{font:var(--type-caption);color:var(--text-strong);text-transform:uppercase;letter-spacing:.04em}
.hx{font:var(--type-overline);color:var(--text-muted);font-family:var(--font-body)}
.bd{border:1px solid var(--border-subtle)}</style></head>
<body><div class="row">
<div class="sw"><div class="chip" style="background:var(--rv-voyage-blue)"></div><div class="meta"><div class="nm">Voyage Blue</div><div class="hx">#087BB9</div></div></div>
<div class="sw"><div class="chip" style="background:var(--rv-explorer-teal)"></div><div class="meta"><div class="nm">Explorer Teal</div><div class="hx">#00A383</div></div></div>
<div class="sw"><div class="chip" style="background:var(--rv-aurora-green)"></div><div class="meta"><div class="nm">Aurora Green</div><div class="hx">#2FB67A</div></div></div>
<div class="sw"><div class="chip" style="background:var(--rv-voyager-black)"></div><div class="meta"><div class="nm">Voyager Black</div><div class="hx">#0A1418</div></div></div>
<div class="sw bd"><div class="chip" style="background:var(--rv-clarity-white)"></div><div class="meta"><div class="nm">Clarity White</div><div class="hx">#FFFFFF</div></div></div>
</div></body></html>
