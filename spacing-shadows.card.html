<!-- @dsCard group="Spacing" viewport="700x200" name="Elevation & Shadows" subtitle="Cool-tinted, soft — plus brand glow" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:26px 20px;background:var(--surface-page)}
.row{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.b{width:100px;text-align:center}
.card{height:64px;background:#fff;border-radius:var(--radius-md)}
.glow{height:64px;border-radius:var(--radius-md);background:var(--rv-gradient-primary)}
.t{font:var(--type-overline);color:var(--text-muted);margin-top:9px}</style></head>
<body><div class="row">
<div class="b"><div class="card" style="box-shadow:var(--shadow-xs)"></div><div class="t">xs</div></div><div class="b"><div class="card" style="box-shadow:var(--shadow-sm)"></div><div class="t">sm</div></div><div class="b"><div class="card" style="box-shadow:var(--shadow-md)"></div><div class="t">md</div></div><div class="b"><div class="card" style="box-shadow:var(--shadow-lg)"></div><div class="t">lg</div></div>
<div class="b"><div class="glow" style="box-shadow:var(--shadow-brand)"></div><div class="t">brand glow</div></div>
</div></body></html>
