<!-- @dsCard group="Colors" viewport="700x150" name="Status Colors" subtitle="Success, info, warning, danger" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:18px;background:var(--surface-card)}
.row{display:flex;gap:12px}.sw{flex:1;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm)}
.chip{height:64px}.meta{padding:8px 10px}.nm{font:var(--type-caption);color:var(--text-strong);text-transform:uppercase}
.hx{font:var(--type-overline);color:var(--text-muted)}</style></head>
<body><div class="row">
<div class="sw"><div class="chip" style="background:var(--rv-success)"></div><div class="meta"><div class="nm">Success</div><div class="hx">#00A383</div></div></div>
<div class="sw"><div class="chip" style="background:var(--rv-info)"></div><div class="meta"><div class="nm">Info</div><div class="hx">#087BB9</div></div></div>
<div class="sw"><div class="chip" style="background:var(--rv-warning)"></div><div class="meta"><div class="nm">Warning</div><div class="hx">#E8A317</div></div></div>
<div class="sw"><div class="chip" style="background:var(--rv-danger)"></div><div class="meta"><div class="nm">Danger</div><div class="hx">#E0533D</div></div></div>
</div></body></html>
